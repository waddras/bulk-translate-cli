{
  "GEMINI_API_KEY": "",
  "GEMINI_MODEL": "gemini-2.5-flash",
  "MAX_LINES_PER_CHUNK": 1000,
  "PARALLEL_CHUNKS": 1,
  "PARALLEL_COOLDOWN": 60,
  "GEMINI_MAX_OUTPUT_TOKENS": 0,
  "RETRY_ATTEMPTS": 5,
  "RETRY_COOLDOWN": 10,
  "MAX_BLOB_LINES": 50000,
  "MAX_FAILED_CHUNKS": 5,
  "TRANSLATION_MODE": "chunked",
  "FILE_CONFLICT": "overwrite",
  "EMBED_FONT": false,
  "PRESERVE_TAGS": "pos, an, move, fad, fade;",
  "FONT_NAME": "Amiri",
  "FONT_SIZE": 40,
  "FONT_OUTLINE": 1,
  "FONT_SHADOW": 0,
  "FONT_ALIGNMENT": 2,
  "FONT_MARGIN_L": 20,
  "FONT_MARGIN_R": 20,
  "FONT_MARGIN_V": 30,
  "PROMPT_TEMPLATE": "You are a professional English to Arabic subtitle translator.\n\nContext: These are subtitles from \"{show_name}\". The lines below form a continuous conversation in sequential order — use the full context to produce natural, flowing Arabic dialogue.\n\nRules:\n- Translate to Modern Standard Arabic (MSA), but keep dialogue natural and conversational\n- These lines are a continuous scene — maintain consistency in tone, character voice, and references across all lines\n- Preserve humor, sarcasm, and emotional tone\n- Keep translations concise — must be readable as subtitles\n\nTranslate each value in the following JSON object.\nReturn a valid JSON object with the EXACT same keys and ONLY Arabic values.\nNo extra keys, no explanation, no markdown.\n\n{json_blob}",
  "SOURCE_EXTENSIONS": [".srt", ".ass"],
  "MKV_EXTENSIONS": [".mkv", ".mp4", ".avi"]
}
