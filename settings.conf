{
  "GEMINI_API_KEY": "",
  "GEMINI_MODEL": "gemini-2.5-flash",
  "MODEL_POOL": [
    "gemini-2.5-flash",
    "gemini-2.0-flash",
    "gemini-1.5-flash"
  ],
  "GEMINI_MAX_OUTPUT_TOKENS": 0,

  "TRANSLATION_MODE": "chunked",
  "MAX_LINES_PER_CHUNK": 1000,
  "PARALLEL_CHUNKS": 1,
  "PARALLEL_COOLDOWN": 60,
  "RETRY_ATTEMPTS": 5,
  "RETRY_COOLDOWN": 10,
  "MAX_BLOB_LINES": 50000,
  "MAX_FAILED_CHUNKS": 5,

  "SOURCE_LANGUAGE": "english",
  "TARGET_LANGUAGE": "arabic",
  "LANGUAGE_CODES": {
    "arabic": "ar",
    "french": "fr",
    "spanish": "es",
    "german": "de",
    "japanese": "ja",
    "english": "en",
    "portuguese": "pt",
    "italian": "it",
    "korean": "ko",
    "chinese": "zh"
  },

  "FILE_CONFLICT": "overwrite",
  "EMBED_FONT": false,
  "FONT_NAME": "Amiri",
  "FONT_SIZE": 40,
  "FONT_OUTLINE": 1,
  "FONT_SHADOW": 0,
  "FONT_ALIGNMENT": 2,
  "FONT_MARGIN_L": 20,
  "FONT_MARGIN_R": 20,
  "FONT_MARGIN_V": 30,

  "PRESERVE_TAGS": "pos, an, move, fad, fade;",

  "SOURCE_EXTENSIONS": [".srt", ".ass", ".ssa"],
  "MKV_EXTENSIONS": [".mkv", ".mp4", ".avi"],
  "SKIP_DIRS": ["Extras", "extras", "Featurettes", "featurettes", "Behind the Scenes"],

  "PROMPT_TEMPLATE": "You are a professional {source_language} to {target_language} subtitle translator.\n\nContext: These are subtitles from \"{show_name}\". The lines below form a continuous conversation in sequential order — use the full context to produce natural, flowing {target_language} dialogue.\n\nRules:\n- Translate to natural, conversational {target_language}\n- These lines are a continuous scene — maintain consistency in tone, character voice, and references across all lines\n- Preserve humor, sarcasm, and emotional tone\n- Keep translations concise — must be readable as subtitles\n\nTranslate each value in the following JSON object.\nReturn a valid JSON object with the EXACT same keys and ONLY {target_language} values.\nNo extra keys, no explanation, no markdown.\n\n{json_blob}"
}
