{
  // ═══════════════════════════════════════════════════════════════════════════
  // API CONFIGURATION
  // ═══════════════════════════════════════════════════════════════════════════

  // Your Gemini API key file path. The key is loaded from this file.
  // File format: GEMINI_API_KEY=your-key-here (or just the bare key on one line).
  // Can also be overridden via GEMINI_API_KEY environment variable.
  // On first run without a key, btcli will prompt you to set one up.
  "GEMINI_API_KEY_FILE": "~/.btcli.env",

  // Primary model used for translation. This is the first model tried.
  // gemini-3.1-flash-lite has the highest rate limit (500 RPD, 15 RPM).
  "GEMINI_MODEL": "gemini-3.1-flash-lite",

  // Models to cycle through on retries (in order of priority).
  // When a chunk fails, the next retry uses the next model in this list.
  // RPD = requests per day, RPM = requests per minute.
  //   gemini-3.1-flash-lite:  500 RPD, 15 RPM
  //   gemini-2.5-flash:        20 RPD,  5 RPM
  //   gemini-2.5-flash-lite:   20 RPD, 10 RPM
  //   gemini-3.5-flash:        20 RPD,  5 RPM
  "MODEL_POOL": [
    "gemini-3.1-flash-lite",
    "gemini-2.5-flash",
    "gemini-2.5-flash-lite",
    "gemini-3.5-flash"
  ],

  // Max output tokens per API response. 0 = no limit (model decides).
  "GEMINI_MAX_OUTPUT_TOKENS": 0,

  // ═══════════════════════════════════════════════════════════════════════════
  // TRANSLATION SETTINGS
  // ═══════════════════════════════════════════════════════════════════════════

  // Translation mode:
  //   "chunked"      — (default) independent chunks, parallel batches with cooldown
  //   "multi_turn"   — full blob as context, chunks as conversation turns
  //   "full_context" — full blob sent every request, only specific keys translated
  // chunked is fastest/cheapest. full_context gives best quality but uses more tokens.
  "TRANSLATION_MODE": "chunked",

  // Max subtitle lines per API call. Lower = more API calls but less likely to fail.
  // Recommended: 500-1000 for flash models.
  "MAX_LINES_PER_CHUNK": 1000,

  // How many chunks to send simultaneously per batch.
  // Keep at 1 unless you have high RPM limits.
  "PARALLEL_CHUNKS": 1,

  // Seconds to wait between API calls (cooldown timer).
  // Prevents rate limiting. Applies between EVERY call, not just batches.
  "PARALLEL_COOLDOWN": 60,

  // How many times to retry a failed chunk before giving up.
  "RETRY_ATTEMPTS": 5,

  // Seconds to wait between retry attempts (multiplied by attempt number).
  "RETRY_COOLDOWN": 10,

  // Maximum total cues across all files. Safety limit to prevent accidental huge jobs.
  "MAX_BLOB_LINES": 50000,

  // Max retry rounds for missing lines after all chunks complete.
  // Each round cycles to the next model in MODEL_POOL.
  "MAX_FAILED_CHUNKS": 5,

  // ═══════════════════════════════════════════════════════════════════════════
  // LANGUAGE SETTINGS
  // ═══════════════════════════════════════════════════════════════════════════

  // Default source language (used when -l flag only specifies target).
  "SOURCE_LANGUAGE": "english",

  // Default target language (used when -l flag is omitted).
  "TARGET_LANGUAGE": "arabic",

  // Language name → 2-letter code mapping.
  // Used to auto-generate output filename suffix (e.g. "arabic" → ".ar").
  // Add more languages here as needed.
  "LANGUAGE_CODES": {
    "arabic": "ar",
    "french": "fr",
    "spanish": "es",
    "german": "de",
    "japanese": "ja",
    "english": "en",
    "portuguese": "pt",
    "italian": "it",
    "korean": "ko",
    "chinese": "zh"
  },

  // ═══════════════════════════════════════════════════════════════════════════
  // OUTPUT SETTINGS
  // ═══════════════════════════════════════════════════════════════════════════

  // What to do when output file already exists:
  //   "overwrite" — replace existing file
  //   "rename"    — add _1, _2, etc. suffix
  "FILE_CONFLICT": "overwrite",

  // Embed a subsetted Arabic font directly into ASS output files.
  // Requires fonttools package. Font must be installed on the system.
  // Set to true if target player doesn't have Arabic fonts.
  "EMBED_FONT": true,

  // Font settings for ASS output files.
  // These control the Default style in generated .ar.ass files.
  "FONT_NAME": "Noto Sans Arabic",
  "FONT_SIZE": 18,
  "FONT_OUTLINE": 1,
  "FONT_SHADOW": 0,

  // Subtitle alignment (SSA/ASS numbering):
  //   1=bottom-left, 2=bottom-center, 3=bottom-right
  //   4=mid-left,    5=mid-center,    6=mid-right
  //   7=top-left,    8=top-center,    9=top-right
  "FONT_ALIGNMENT": 2,

  // Margins in pixels (distance from video edge).
  "FONT_MARGIN_L": 20,
  "FONT_MARGIN_R": 20,
  "FONT_MARGIN_V": 30,

  // ═══════════════════════════════════════════════════════════════════════════
  // TAG PRESERVATION
  // ═══════════════════════════════════════════════════════════════════════════

  // ASS override tags to preserve through translation.
  // These tags are extracted before translation and re-attached to the output.
  // Common tags: pos (positioning), an (alignment), move, fad/fade (fading).
  // Semicolon at end is required.
  "PRESERVE_TAGS": "pos, an, move, fad, fade;",

  // ═══════════════════════════════════════════════════════════════════════════
  // FILE DISCOVERY
  // ═══════════════════════════════════════════════════════════════════════════

  // Subtitle file extensions to look for with -i sub.
  "SOURCE_EXTENSIONS": [".srt", ".ass", ".ssa"],

  // Video file extensions to look for with -i vid.
  "MKV_EXTENSIONS": [".mkv", ".mp4", ".avi"],

  // Directory names to skip during file discovery.
  // Case-sensitive. Add any folder names you want ignored.
  "SKIP_DIRS": ["Extras", "extras", "Featurettes", "featurettes", "Behind the Scenes"],

  // ═══════════════════════════════════════════════════════════════════════════
  // PROMPT TEMPLATE
  // ═══════════════════════════════════════════════════════════════════════════

  // The prompt sent to Gemini for each translation chunk.
  // Available placeholders:
  //   {source_language} — source language name (e.g. "english")
  //   {target_language} — target language name (e.g. "arabic")
  //   {show_name}       — auto-detected or manually set show name
  //   {json_blob}       — the JSON object containing lines to translate
  "PROMPT_TEMPLATE": "You are a professional {source_language} to {target_language} subtitle translator.\n\nContext: These are subtitles from \"{show_name}\". The lines below form a continuous conversation in sequential order — use the full context to produce natural, flowing {target_language} dialogue.\n\nRules:\n- Translate to natural, conversational {target_language}\n- These lines are a continuous scene — maintain consistency in tone, character voice, and references across all lines\n- Preserve humor, sarcasm, and emotional tone\n- Keep translations concise — must be readable as subtitles\n- NEVER censor, redact, or replace words with asterisks. Translate ALL content exactly as-is, including profanity, slurs, and adult language. This is professional subtitle work for mature audiences.\n\nTranslate each value in the following JSON object.\nReturn a valid JSON object with the EXACT same keys and ONLY {target_language} values.\nNo extra keys, no explanation, no markdown.\n\n{json_blob}"
}
